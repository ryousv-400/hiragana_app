<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>たのしい ひらがな</title>

  <!-- 子供向けの可愛らしい丸ゴシックフォント -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="app">
    <!-- コンテンツは JavaScript で動的に生成されます -->
  </div>

  <!-- マスコットキャラクター（うさぎ） -->
  <div class="mascot-container">
    <div class="speech-bubble" id="mascot-speech">あいてるワクを<br>えらんでね！</div>
    <svg class="mascot-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- 後ろの耳 -->
      <ellipse cx="25" cy="20" rx="10" ry="25" fill="#ffffff" stroke="#ffb6c1" stroke-width="2"
        transform="rotate(-15 25 20)" />
      <ellipse cx="25" cy="20" rx="5" ry="15" fill="#ffb6c1" transform="rotate(-15 25 20)" />
      <ellipse cx="75" cy="20" rx="10" ry="25" fill="#ffffff" stroke="#ffb6c1" stroke-width="2"
        transform="rotate(15 75 20)" />
      <ellipse cx="75" cy="20" rx="5" ry="15" fill="#ffb6c1" transform="rotate(15 75 20)" />
      <!-- 顔 -->
      <ellipse cx="50" cy="60" rx="45" ry="35" fill="#ffffff" stroke="#ffb6c1" stroke-width="2" />
      <!-- ほっぺ -->
      <ellipse cx="20" cy="65" rx="8" ry="4" fill="#ff99cc" opacity="0.6" />
      <ellipse cx="80" cy="65" rx="8" ry="4" fill="#ff99cc" opacity="0.6" />
      <!-- 目 -->
      <circle cx="30" cy="55" r="4" fill="#4B4B4B" />
      <circle cx="70" cy="55" r="4" fill="#4B4B4B" />
      <!-- 鼻と口 -->
      <ellipse cx="50" cy="62" rx="3" ry="2" fill="#ffb6c1" />
      <path d="M 40 68 Q 50 75 60 68" fill="none" stroke="#4B4B4B" stroke-width="2" stroke-linecap="round" />
    </svg>
  </div>

  <!-- キャンバス上の紙吹雪エフェクト用ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <!-- アプリケーションデータとロジック -->
  <script src="data.js"></script>
  <script src="app.js"></script>

</body>

</html>
